spring.application.name=placement-portal
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
